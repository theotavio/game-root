name: gameroot
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  
  # Ícones
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3

  # Estados
  provider: ^6.1.2

  # Biometria e reconhecimento facil nativo
  local_auth: ^3.0.1

  # Geolocalização
  geolocator: ^14.0.3
  geocoding: ^4.0.0

  # Logo vetorizada
  flutter_svg: ^2.0.10+1

  # Som da splash screen
  audioplayers: ^6.0.0

  # Formatação e máscaras de campos
  mask_text_input_formatter: ^2.9.0

  # Tipografia
  google_fonts: ^8.1.0

  # Permissões
  permission_handler: ^12.0.3

  # Geração de identificadores únicos
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true